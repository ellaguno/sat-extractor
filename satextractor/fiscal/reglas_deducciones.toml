nombre = "Régimen Simplificado de Confianza"
fundamento = "LISR Art. 113-E a 113-J"
descripcion = "Régimen simplificado con tasa fija sobre ingresos, sin deducciones autorizadas empresariales"
metodo_isr = "resico"
limite_ingresos = 3500000
nota = "RESICO no permite deducciones de gastos empresariales. Solo aplican deducciones personales en declaración anual. Si ingresos > $3.5M, se sale de RESICO."

# Tabla ISR mensual RESICO (Art. 113-E LISR)
[regimenes."626".tabla_isr_mensual]
tramos = [
    { limite_inferior = 0.01, limite_superior = 25000.00, tasa = 1.00 },
    { limite_inferior = 25000.01, limite_superior = 50000.00, tasa = 1.10 },
    { limite_inferior = 50000.01, limite_superior = 83333.33, tasa = 1.50 },
    { limite_inferior = 83333.34, limite_superior = 208333.33, tasa = 2.00 },
    { limite_inferior = 208333.34, limite_superior = 3500000.00, tasa = 2.50 },
]

[regimenes."626".deducciones_personales]
limite_global = "15% ingreso anual o 5 UMA anuales"
nota = "Mismas deducciones personales que régimen 612 (Art. 151 LISR)"

# ── Requisitos generales de deducción (Art. 27 y 105 LISR) ──────────────────
[requisitos_generales]
[requisitos_generales.pago_bancarizado]
descripcion = "Pagos mayores a $2,000 deben ser con medio electrónico"
limite_efectivo = 2000.0
fundamento = "Art. 27 Fracc. III LISR"
formas_pago_validas = ["02", "03", "04", "05", "06", "28", "29"]
# 02=Cheque, 03=Transferencia, 04=Tarjeta crédito, 05=Monedero electrónico
# 06=Dinero electrónico, 28=Tarjeta débito, 29=Tarjeta servicios
nota = "Pagos en efectivo mayores a $2,000 NO son deducibles"

[requisitos_generales.cfdi_vigente]
descripcion = "Contar con CFDI vigente (no cancelado)"
fundamento = "Art. 27 Fracc. XVIII LISR"

[requisitos_generales.estrictamente_indispensable]
descripcion = "El gasto debe ser estrictamente indispensable para la actividad"
fundamento = "Art. 27 Fracc. I LISR"

[requisitos_generales.registrado_contabilidad]
descripcion = "Estar registrado en contabilidad"
fundamento = "Art. 27 Fracc. IV LISR"

[requisitos_generales.efectivamente_pagado]
descripcion = "Para personas físicas, el gasto debe estar efectivamente pagado"
fundamento = "Art. 105 LISR"
nota = "A diferencia de personas morales que pueden deducir en base a lo devengado"
