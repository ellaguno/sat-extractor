# ── Régimen 625: Plataformas Tecnológicas ──────────────────────────────────
[regimenes."625"]
nombre = "Actividades Empresariales con ingresos a través de Plataformas Tecnológicas"
fundamento = "LISR Art. 113-A a 113-D"
descripcion = "Ingresos a través de plataformas digitales: transporte (Uber, Didi), alimentos (Rappi, UberEats), hospedaje (Airbnb), venta de bienes"
metodo_isr = "plataformas"
limite_ingresos_definitivo = 300000
nota = "Las plataformas retienen ISR e IVA. Si ingresos anuales < $300,000, los pagos pueden ser definitivos."

[regimenes."625".tasas_retencion]
transporte = 2.1
alimentos = 2.1
hospedaje = 4.0
venta_bienes = 1.0
otros = 2.1
iva_digital = 8.0

# RESICO y Plataformas no tienen deducciones empresariales significativas
# Solo aplican deducciones personales en declaración anual (si no son pagos definitivos)
[regimenes."625".deducciones_personales]
limite_global = "15% ingreso anual o 5 UMA anuales"
nota = "Solo aplica si el contribuyente presenta declaración anual (ingresos > $300,000 o no optó por pagos definitivos)"

# ── Régimen 626: Simplificado de Confianza (RESICO) ─────────────────────────
