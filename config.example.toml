[fiel]
cer_path = "/ruta/a/tu/certificado.cer"
key_path = "/ruta/a/tu/llave_privada.key"
# password = "tu_contraseña_aqui"  # Opcional: si no se pone, se pide al ejecutar

[sat]
rfc = "TU_RFC_AQUI"

[database]
path = "~/satextractor.db"

[export]
output_dir = "~/reportes_sat"

# ── Análisis Fiscal Inteligente (opcional) ──

[contribuyente]
regimen = "612"  # 601=PM General, 603=PM No Lucrativa, 612=PFAE, 625=Plataformas, 626=RESICO
# actividad = "Desarrollo de software"  # Descripción de tu actividad económica
# coeficiente_utilidad = 0.35  # Solo para régimen 601 (PM), del ejercicio anterior
# actividad_plataforma = "otros"  # Solo para régimen 625: transporte, alimentos, hospedaje, venta_bienes, otros

[ia]
# provider = "anthropic"  # anthropic, deepseek, openrouter
# api_key = ""  # O usa variable de entorno ANTHROPIC_API_KEY / DEEPSEEK_API_KEY / OPENROUTER_API_KEY
# model = "claude-sonnet-4-6"  # deepseek-chat / anthropic/claude-sonnet-4-6 (openrouter)
# base_url = ""  # Solo para openrouter u otro proveedor OpenAI-compatible
